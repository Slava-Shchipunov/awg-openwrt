name: Build OpenWrt Feed

on:
  workflow_dispatch:
    inputs:
      version:
        description: "OpenWRT version (e.g., 24.10.6 or 25.12.3)"
        required: true
        type: string
      targets:
        description: "Targets (comma-separated, optional)"
        required: false
        type: string
      subtargets:
        description: "Subtargets (comma-separated, optional)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  generate-config:
    runs-on: ubuntu-latest
    outputs:
      job-config: ${{ steps.generate-config.outputs.job-config }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.16.0"

      - name: Prepare build inputs
        run: |
          echo "VERSION=${{ inputs.version }}" >> "$GITHUB_ENV"

          if [ -n "${{ inputs.targets }}" ]; then
            echo "TARGETS=${{ inputs.targets }}" >> "$GITHUB_ENV"
          fi

          if [ -n "${{ inputs.subtargets }}" ]; then
            echo "SUBTARGETS=${{ inputs.subtargets }}" >> "$GITHUB_ENV"
          fi

      - name: Install dependencies
        run: npm install

      # Reuse existing matrix generation logic from release workflow.
      - name: Generate job config
        id: generate-config
        run: node index.js "${{ env.VERSION }}" "${{ env.TARGETS }}" "${{ env.SUBTARGETS }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-feed:
    name: "v${{ matrix.build_env.tag }} - ${{ matrix.build_env.pkgarch }} :: feed"
    runs-on: ubuntu-latest
    needs: generate-config
    strategy:
      matrix:
        build_env: ${{ fromJson(needs.generate-config.outputs.job-config) }}
      fail-fast: false
    steps:
      - name: Checkout AWG source code
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pyelftools zstd

      - name: Cache OpenWrt SDK
        id: cache-sdk
        uses: actions/cache@v4
        env:
          cache-name: "cache-sdk-${{ matrix.build_env.tag }}-${{ matrix.build_env.target }}-${{ matrix.build_env.subtarget }}"
        with:
          path: openwrt-sdk-*/
          key: ${{ runner.os }}-sdk-${{ env.cache-name }}

      - name: Download and extract OpenWrt SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          echo "pkgarch: ${{ matrix.build_env.pkgarch }}, target:${{ matrix.build_env.target }}, subtarget:${{ matrix.build_env.subtarget }}"

          SDK_FILE=$(curl -s "https://downloads.openwrt.org/releases/${{ matrix.build_env.tag }}/targets/${{ matrix.build_env.target }}/${{ matrix.build_env.subtarget }}/" | grep -o "openwrt-sdk-${{ matrix.build_env.tag }}-${{ matrix.build_env.target }}-${{ matrix.build_env.subtarget }}_gcc-[^\"]*_musl[^\"]*\.Linux-x86_64\.tar\.[xz|zst]*" | head -n1)

          if [ -z "$SDK_FILE" ]; then
            echo "SDK file not found for ${{ matrix.build_env.tag }} ${{ matrix.build_env.target }}/${{ matrix.build_env.subtarget }}"
            exit 1
          fi

          SDK_DOWNLOAD_URL="https://downloads.openwrt.org/releases/${{ matrix.build_env.tag }}/targets/${{ matrix.build_env.target }}/${{ matrix.build_env.subtarget }}/${SDK_FILE}"
          echo "Downloading SDK: $SDK_DOWNLOAD_URL"
          wget "$SDK_DOWNLOAD_URL"

          if [[ "$SDK_FILE" == *.tar.zst ]]; then
            tar --zstd -xf "$SDK_FILE"
          elif [[ "$SDK_FILE" == *.tar.xz ]]; then
            tar -xf "$SDK_FILE"
          else
            echo "Unknown archive format: $SDK_FILE"
            exit 1
          fi

          rm "$SDK_FILE"

      - name: Setup SDK and feeds
        run: |
          set -euo pipefail
          SDK_DIR=$(find . -maxdepth 1 -name "openwrt-sdk-*" -type d | head -n1)

          if [ -z "$SDK_DIR" ]; then
            echo "SDK directory not found"
            exit 1
          fi

          WORKSPACE_DIR=$(pwd)
          cd "$SDK_DIR"

          # Register isolated custom AWG feed as a local linked feed.
          AWG_FEED_DIR="$WORKSPACE_DIR/.tmp-awg-feed"
          rm -rf "$AWG_FEED_DIR"
          mkdir -p "$AWG_FEED_DIR"
          cp -a "$WORKSPACE_DIR/kmod-amneziawg" "$AWG_FEED_DIR/"
          cp -a "$WORKSPACE_DIR/amneziawg-tools" "$AWG_FEED_DIR/"
          cp -a "$WORKSPACE_DIR/luci-proto-amneziawg" "$AWG_FEED_DIR/"
          # Keep default OpenWrt feeds (including luci) and append custom AWG feed.
          if [ -f feeds.conf ]; then
            cp feeds.conf feeds.conf.bak
          elif [ -f feeds.conf.default ]; then
            cp feeds.conf.default feeds.conf
          else
            echo "feeds.conf.default is missing"
            exit 1
          fi
          echo "src-link awg $AWG_FEED_DIR" >> feeds.conf

          ./scripts/feeds update -a
          ./scripts/feeds install -a
          ./scripts/feeds update awg
          ./scripts/feeds install -a -p awg

          echo "CONFIG_PACKAGE_kmod-amneziawg=m" > .config
          echo "CONFIG_PACKAGE_amneziawg-tools=y" >> .config
          echo "CONFIG_PACKAGE_luci-proto-amneziawg=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-amneziawg-ru=y" >> .config
          # Ensure feed metadata/signatures are generated in SDK output.
          echo "CONFIG_SIGNED_PACKAGES=y" >> .config

          make defconfig

      - name: Build AmneziaWG packages
        run: |
          set -euo pipefail
          SDK_DIR=$(find . -maxdepth 1 -name "openwrt-sdk-*" -type d | head -n1)
          cd "$SDK_DIR"
          # Build only AWG feed packages from package/feeds/awg (isolated custom namespace).
          make package/feeds/awg/kmod-amneziawg/{download,prepare} V=s
          make package/feeds/awg/kmod-amneziawg/compile V=s
          make package/feeds/awg/luci-proto-amneziawg/{download,prepare} V=s
          make package/feeds/awg/luci-proto-amneziawg/compile V=s
          make package/feeds/awg/amneziawg-tools/{download,prepare} V=s
          make package/feeds/awg/amneziawg-tools/compile V=s

          # Generate repository metadata/signatures via OpenWrt buildsystem.
          make package/index V=s

          # Canonical AWG feed must be isolated from base feed.
          MAJOR_VERSION="${{ matrix.build_env.tag }}"
          MAJOR_VERSION="${MAJOR_VERSION%%.*}"
          CANONICAL_AWG_FEED_DIR="$SDK_DIR/bin/packages/${{ matrix.build_env.pkgarch }}/awg"
          if [ ! -d "$CANONICAL_AWG_FEED_DIR" ]; then
            echo "Canonical AWG feed directory not found: $CANONICAL_AWG_FEED_DIR"
            exit 1
          fi
          ls "$CANONICAL_AWG_FEED_DIR"/amneziawg-tools*.?pk >/dev/null
          ls "$CANONICAL_AWG_FEED_DIR"/kmod-amneziawg*.?pk >/dev/null
          ls "$CANONICAL_AWG_FEED_DIR"/luci-proto-amneziawg*.?pk >/dev/null
          ls "$CANONICAL_AWG_FEED_DIR"/luci-i18n-amneziawg-ru*.?pk >/dev/null

          echo "CANONICAL_AWG_FEED_DIR=$CANONICAL_AWG_FEED_DIR" >> "$GITHUB_ENV"

          # Validate SDK-generated metadata in canonical feed.
          if [ "$MAJOR_VERSION" -ge 25 ]; then
            test -s "$CANONICAL_AWG_FEED_DIR/packages.adb"
            test -s "$CANONICAL_AWG_FEED_DIR/packages.adb.sig"
          else
            test -s "$CANONICAL_AWG_FEED_DIR/Packages"
            test -s "$CANONICAL_AWG_FEED_DIR/Packages.gz"
            test -s "$CANONICAL_AWG_FEED_DIR/Packages.sig"
          fi

      - name: Prepare feed publish directory
        run: |
          set -euo pipefail

          SDK_DIR=$(find . -maxdepth 1 -name "openwrt-sdk-*" -type d | head -n1)
          VERSION="${{ matrix.build_env.tag }}"
          TARGET="${{ matrix.build_env.target }}"
          SUBTARGET="${{ matrix.build_env.subtarget }}"
          PKGARCH="${{ matrix.build_env.pkgarch }}"
          FEED_DIR="$GITHUB_WORKSPACE/feed-publish/$VERSION/$TARGET/$SUBTARGET/$PKGARCH"
          CANONICAL_AWG_FEED_DIR="${CANONICAL_AWG_FEED_DIR:?canonical feed is not resolved}"

          mkdir -p "$FEED_DIR"
          cp -a "$CANONICAL_AWG_FEED_DIR"/. "$FEED_DIR"/

          # Persist a stable key path for client trust bootstrap.
          mkdir -p "$GITHUB_WORKSPACE/feed-publish/keys"
          find "$SDK_DIR" -type f -name "*.pub" -exec cp -a {} "$GITHUB_WORKSPACE/feed-publish/keys/" \;

      - name: Feed smoke tests
        run: |
          set -euo pipefail

          SDK_DIR=$(find . -maxdepth 1 -name "openwrt-sdk-*" -type d | head -n1)
          VERSION="${{ matrix.build_env.tag }}"
          MAJOR_VERSION="${VERSION%%.*}"
          FEED_DIR="$GITHUB_WORKSPACE/feed-publish/${{ matrix.build_env.tag }}/${{ matrix.build_env.target }}/${{ matrix.build_env.subtarget }}/${{ matrix.build_env.pkgarch }}"

          test -d "$FEED_DIR"

          # Ensure expected packages are present as package files.
          ls "$FEED_DIR"/amneziawg-tools*.?pk >/dev/null
          ls "$FEED_DIR"/kmod-amneziawg*.?pk >/dev/null
          ls "$FEED_DIR"/luci-proto-amneziawg*.?pk >/dev/null
          ls "$FEED_DIR"/luci-i18n-amneziawg-ru*.?pk >/dev/null

          if [ "$MAJOR_VERSION" -ge 25 ]; then
            # APK repository must exist and include kmod in adb index.
            test -s "$FEED_DIR/packages.adb"
            test -f "$FEED_DIR/packages.adb.sig"
            APK_BIN="$SDK_DIR/staging_dir/host/bin/apk"
            if [ ! -x "$APK_BIN" ]; then
              echo "OpenWrt host apk tool not found: $APK_BIN"
              exit 1
            fi
            ADB_DUMP_FILE="$RUNNER_TEMP/packages.adb.dump"
            "$APK_BIN" adbdump "$FEED_DIR/packages.adb" > "$ADB_DUMP_FILE"
            grep -q "amneziawg-tools" "$ADB_DUMP_FILE"
            grep -q "kmod-amneziawg" "$ADB_DUMP_FILE"
            grep -q "luci-proto-amneziawg" "$ADB_DUMP_FILE"
            grep -q "luci-i18n-amneziawg-ru" "$ADB_DUMP_FILE"
            ! grep -q "busybox" "$ADB_DUMP_FILE"
            ! grep -q "\blibc\b" "$ADB_DUMP_FILE"
            ! grep -q "\bubus\b" "$ADB_DUMP_FILE"
          else
            # opkg repository must exist and include kmod in Packages index.
            test -f "$FEED_DIR/Packages"
            test -f "$FEED_DIR/Packages.gz"
            test -f "$FEED_DIR/Packages.sig"
            zgrep -q "Package: amneziawg-tools" "$FEED_DIR/Packages.gz"
            zgrep -q "Package: kmod-amneziawg" "$FEED_DIR/Packages.gz"
            zgrep -q "Package: luci-proto-amneziawg" "$FEED_DIR/Packages.gz"
            zgrep -q "Package: luci-i18n-amneziawg-ru" "$FEED_DIR/Packages.gz"
            ! zgrep -q "Package: busybox" "$FEED_DIR/Packages.gz"
            ! zgrep -q "Package: libc" "$FEED_DIR/Packages.gz"
            ! zgrep -q "Package: ubus" "$FEED_DIR/Packages.gz"
          fi

      - name: Upload feed artifact
        uses: actions/upload-artifact@v4
        with:
          name: feed-${{ matrix.build_env.tag }}-${{ matrix.build_env.target }}-${{ matrix.build_env.subtarget }}-${{ matrix.build_env.pkgarch }}
          path: feed-publish/
          if-no-files-found: error

  deploy:
    name: Deploy feed to gh-pages
    runs-on: ubuntu-latest
    needs: build-feed
    steps:
      - name: Download all feed artifacts
        uses: actions/download-artifact@v4
        with:
          path: gh-pages-content
          pattern: feed-*
          merge-multiple: true

      - name: Publish to GitHub Pages branch
        # Keep existing feed data for previously built versions/arches.
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: gh-pages-content
          keep_files: true
