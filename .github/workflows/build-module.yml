name: Build AmneziaWG OpenWrt Packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: "OpenWrt version"
        required: true
        default: "24.10.5"
      target:
        description: "Target"
        required: true
        default: "mediatek"
      subtarget:
        description: "Subtarget"
        required: true
        default: "mt7622"

  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: "v${{ inputs.version || github.ref_name }} :: mediatek/mt7622"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        build_env:
          - tag: ${{ inputs.version || github.ref_name }}
            pkgarch: aarch64_cortex-a53
            target: mediatek
            subtarget: mt7622

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            flex \
            bison \
            g++ \
            gawk \
            gcc-multilib \
            gettext \
            git \
            libncurses5-dev \
            libssl-dev \
            python3 \
            python3-pyelftools \
            rsync \
            unzip \
            zlib1g-dev \
            file \
            wget \
            curl \
            zstd

      - name: Cache OpenWrt SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: openwrt-sdk-*/
          key: sdk-${{ runner.os }}-${{ matrix.build_env.tag }}-${{ matrix.build_env.target }}-${{ matrix.build_env.subtarget }}

      - name: Download OpenWrt SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          VERSION="${{ matrix.build_env.tag }}"
          TARGET="${{ matrix.build_env.target }}"
          SUBTARGET="${{ matrix.build_env.subtarget }}"

          echo "Version: $VERSION"
          echo "Target: $TARGET"
          echo "Subtarget: $SUBTARGET"

          URL="https://downloads.openwrt.org/releases/${VERSION}/targets/${TARGET}/${SUBTARGET}/"

          SDK_FILE=$(curl -s "$URL" | grep -oE 'openwrt-sdk-[^"]+\.tar\.(xz|zst)' | head -n1)

          if [ -z "$SDK_FILE" ]; then
            echo "SDK not found"
            exit 1
          fi

          wget "${URL}${SDK_FILE}"

          if [[ "$SDK_FILE" == *.tar.zst ]]; then
            tar --zstd -xf "$SDK_FILE"
          else
            tar -xf "$SDK_FILE"
          fi

          rm -f "$SDK_FILE"

      - name: Prepare SDK
        run: |
          SDK_DIR=$(find . -maxdepth 1 -type d -name "openwrt-sdk-*" | head -n1)
          cd "$SDK_DIR"

          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Copy packages
        run: |
          SDK_DIR=$(find . -maxdepth 1 -type d -name "openwrt-sdk-*" | head -n1)

          cp -r kmod-amneziawg "$SDK_DIR/package/" || true
          cp -r amneziawg-tools "$SDK_DIR/package/" || true
          cp -r luci-proto-amneziawg "$SDK_DIR/package/" || true

      - name: Configure build
        run: |
          SDK_DIR=$(find . -maxdepth 1 -type d -name "openwrt-sdk-*" | head -n1)
          cd "$SDK_DIR"

          cat > .config <<EOF
          CONFIG_PACKAGE_kmod-amneziawg=m
          CONFIG_PACKAGE_amneziawg-tools=y
          CONFIG_PACKAGE_luci-proto-amneziawg=y
          CONFIG_PACKAGE_luci-i18n-amneziawg-ru=y
          EOF

          make defconfig

      - name: Build packages
        run: |
          SDK_DIR=$(find . -maxdepth 1 -type d -name "openwrt-sdk-*" | head -n1)
          cd "$SDK_DIR"

          make package/kmod-amneziawg/compile -j$(nproc) V=s || true
          make package/amneziawg-tools/compile -j$(nproc) V=s
          make package/luci-proto-amneziawg/compile -j$(nproc) V=s

      - name: Collect artifacts
        run: |
          SDK_DIR=$(find . -maxdepth 1 -type d -name "openwrt-sdk-*" | head -n1)

          mkdir -p release

          find "$SDK_DIR/bin/" -name "*.ipk" -exec cp {} release/ \;
          find "$SDK_DIR/bin/" -name "*.apk" -exec cp {} release/ \; || true

          ls -lah release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: amneziawg-${{ matrix.build_env.tag }}
          path: release/*

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
