Составь полный yaml сборки AmneziaWG для OpenWRT v25.12.2 c ядром kernel=6.12.74~09da6f8026836be755e675b8c6a70b8b-r1

Для сборки AmneziaWG под конкретную версию OpenWrt и конкретный хэш ядра через Image Builder, вам понадобится YAML-конфигурация, которая учитывает как саму прошивку, так и необходимые пакеты модифицированного протокола.

Учитывая, что OpenWrt 25.12 — это будущий/экспериментальный релиз (на текущий момент актуальны ветки 23.05), я подготовил структуру, ориентированную на работу с OpenWrt SDK или Image Builder.

YAML Конфигурация для Image Builder
Этот файл описывает профиль сборки. Обратите внимание, что kmod-amneziawg должен быть предварительно скомпилирован или доступен в репозиториях для вашей версии ядра.

YAML
---
name: "OpenWrt-AmneziaWG-Build"
version: "25.12.2"
profile: "generic" # Замените на ваш конкретный профиль (например, tplink_tl-wdr4300)
target: "x86/64"   # Замените на вашу архитектуру (например, ramips/mt7621)

# Указание конкретной версии ядра через репозитории
overrides:
  kernel_version: "6.12.74"
  kernel_hash: "09da6f8026836be755e675b8c6a70b8b"

packages:
  # Базовые пакеты AmneziaWG
  - amneziawg-tools
  - kmod-amneziawg
  - luci-app-amneziawg
  
  # Зависимости и сопутствующие инструменты
  - kmod-udp-tunnel
  - kmod-ip6-tunnel
  - wireguard-tools
  
  # Стандартный набор для работы сети
  - ip-full
  - kmod-tun

# Кастомные настройки (Files)
files: "files"

# Инструкция по сборке (diffconfig)
diffconfig: |
  CONFIG_PACKAGE_kmod-amneziawg=y
  CONFIG_PACKAGE_amneziawg-tools=y
  CONFIG_PACKAGE_luci-app-amneziawg=y
Ключевые моменты при сборке
Совместимость ядра:
Поскольку вы указали очень специфический хэш ядра (09da6f80...), обычный opkg install может выдать ошибку kernel magic mismatch. Чтобы этого избежать, AmneziaWG должна собираться в той же среде (SDK), где было скомпилировано ваше ядро.

Репозитории (feeds.conf):
Для успешной сборки убедитесь, что в вашем окружении подключен фид с AmneziaWG. Обычно это делается добавлением строки в feeds.conf.default:

Plaintext
src-git amnezia https://github.com/amnezia-vpn/amneziawg-openwrt.git
Параметры протокола:
AmneziaWG отличается от стандартного WireGuard наличием "мусорных" байтов и измененными заголовками. В интерфейсе LuCI (если добавили luci-app-amneziawg) появятся дополнительные поля:

Jc (Junk packet count)

Jmin / Jmax (Junk packet size)

S1 / S2 (Magic headers)

H1 / H2 / H3 / H4 (Hash values)

Как использовать этот файл
Если вы используете систему автоматизации (например, GitHub Actions для сборки кастомных образов), сохраните этот текст как .github/workflows/build.yml или config.yaml в зависимости от используемого скрипта сборщика.

Важное замечание: Версия 25.12.2 на данный момент является гипотетической или относится к "ветке будущего". Убедитесь, что вы используете корректный URL для загрузки Image Builder, соответствующий этой версии. Если это форк или кастомная сборка (например, от ImmoralWrt), пути к пакетам могут отличаться.

Для сборки на github

Для автоматизации сборки образа OpenWrt с поддержкой AmneziaWG через GitHub Actions, наиболее эффективным инструментом является использование экшена p3terx/openwrt-builder или аналогичных на базе imagebuilder.

Ниже приведен полный YAML-файл рабочего процесса (.github/workflows/build-openwrt.yml) и вспомогательный конфигурационный файл.

1. GitHub Actions Workflow (.github/workflows/build-openwrt.yml)
Этот сценарий разворачивает окружение, скачивает Image Builder для вашей версии и интегрирует репозиторий AmneziaWG.

YAML
name: Build OpenWrt with AmneziaWG

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  # Указываем ваши специфические параметры
  VERSION: "25.12.2"
  TARGET: "x86"
  SUBTARGET: "64"
  KERNEL_VER: "6.12.74"
  # Ссылка на Image Builder (замените на актуальное зеркало вашей версии)
  IB_URL: "https://downloads.openwrt.org/snapshots/targets/x86/64/openwrt-imagebuilder-x86-64.Linux-x86_64.tar.xz"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preparation
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev libncursesw5-dev \
            zlib1g-dev gawk git gettext libssl-dev xsltproc wget unzip python3

      - name: Download and Unpack Image Builder
        run: |
          wget $IB_URL
          tar -xJf *.tar.xz
          mv openwrt-imagebuilder-* ib

      - name: Add AmneziaWG Feed
        working-directory: ./ib
        run: |
          # Добавляем репозиторий с исходниками AmneziaWG
          echo "src-git amnezia https://github.com/amnezia-vpn/amneziawg-openwrt.git" >> feeds.conf.default
          ./scripts/feeds update amnezia
          ./scripts/feeds install -a -p amnezia

      - name: Compile Kmod-AmneziaWG
        working-directory: ./ib
        run: |
          # Для сборки модуля под конкретное ядро через IB требуются установленные пакеты
          make defconfig
          # Мы добавляем пакеты в список сборки образа ниже

      - name: Build Image
        working-directory: ./ib
        run: |
          # PACKAGES: указываем AmneziaWG и зависимости
          # FILES: если у вас есть папка 'files' с конфигами в репозитории
          make image \
            PACKAGES="amneziawg-tools kmod-amneziawg luci-app-amneziawg wireguard-tools bash" \
            FILES="../files" \
            EXTRA_IMAGE_NAME="AmneziaWG-Custom"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt_AmneziaWG_${{ env.VERSION }}
          path: ./ib/bin/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}/*
2. Структура репозитория
Для корректной работы YAML выше, ваш репозиторий должен выглядеть так:

.github/workflows/build-openwrt.yml

files/etc/config/network (опционально: преднастроенные интерфейсы)

files/etc/config/amneziawg (опционально: ваши ключи и настройки порта)

3. Нюанс с хэшем ядра (Kernel Hash)
Вы указали очень точный хэш ядра: 6.12.74~09da6f80....
Если вы используете официальный Image Builder, он автоматически соберет пакеты под то ядро, которое в него "вшито".

Если ваше ядро — это кастомная сборка (например, от провайдера или стороннего разработчика), Image Builder не подойдет. В этом случае вам нужно:

Использовать Full SDK вместо Image Builder.

В процессе сборки SDK подменить vermagic ядра.

Если же вы собираете образ целиком "с нуля" из исходников OpenWrt (а не через Image Builder), добавьте в ваш .config следующие строки:

Bash
CONFIG_PACKAGE_kmod-amneziawg=y
CONFIG_PACKAGE_amneziawg-tools=y
CONFIG_PACKAGE_luci-app-amneziawg=y
# Фиксация версии ядра (если собираете из дерева исходников)
CONFIG_LINUX_6_12=y
CONFIG_KERNEL_GIT_REF="09da6f8026836be755e675b8c6a70b8b"
Резюме по действиям:
Создайте новый публичный/приватный репозиторий на GitHub.

Создайте файл по пути .github/workflows/build-openwrt.yml.

Вставьте код выше.

Перейдите во вкладку Actions в GitHub и запустите сборку вручную через Run workflow.

Составь полный yaml сборки AmneziaWG для OpenWRT v25.12.2 c ядром kernel=6.12.74~09da6f8026836be755e675b8c6a70b8b-r1 на основе: name: Create Release on Tag



on:

  push:

    tags:

      - "v*.*.*"

  workflow_call:

    inputs:

      tag_name:

        required: true

        type: string

  workflow_dispatch:

    inputs:

      version:

        description: 'OpenWRT version (e.g., 24.10.5)'

        required: true

        type: string

      targets:

        description: 'Targets (comma-separated, optional)'

        required: false

        type: string

      subtargets:

        description: 'Subtargets (comma-separated, optional)'

        required: false

        type: string





jobs:

  generate-config:

    runs-on: ubuntu-latest

    outputs:

      job-config: ${{ steps.generate-config.outputs.job-config }}

    steps:

      - name: Checkout code

        uses: actions/checkout@v4



      - name: Set up Node.js

        uses: actions/setup-node@v4

        with:

          node-version: '20.16.0'



      - name: Get OpenWRT version from inputs or tag

        run: |

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then

            echo "VERSION=${{ inputs.version }}" >> $GITHUB_ENV



            if [ -n "${{ inputs.targets }}" ]; then

              echo "TARGETS=${{ inputs.targets }}" >> $GITHUB_ENV

            fi



            if [ -n "${{ inputs.subtargets }}" ]; then

              echo "SUBTARGETS=${{ inputs.subtargets }}" >> $GITHUB_ENV

            fi



          elif [ "${{ github.event_name }}" = "workflow_call" ]; then

            echo "VERSION=${{ inputs.tag_name }}" >> $GITHUB_ENV



          else

            echo "VERSION=${GITHUB_REF/refs\/tags\/v/}" >> $GITHUB_ENV

          fi



      - name: Install dependencies

        run: npm install



      - name: Generate Job Config

        id: generate-config

        run: node index.js ${{ env.VERSION }} "${{ env.TARGETS }}" "${{ env.SUBTARGETS }}"

        env:

          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}



  build:

    name: "v${{ matrix.build_env.tag }} - ${{ matrix.build_env.pkgarch}} :: ${{ matrix.build_env.target}}/${{ matrix.build_env.subtarget}} build"

    runs-on: ubuntu-latest

    needs: generate-config

    strategy:

      matrix:

        build_env: ${{ fromJson(needs.generate-config.outputs.job-config) }}

      fail-fast: false



    steps:

      - name: Checkout AWG source code

        uses: actions/checkout@v4



      - name: Install Python dependencies

        run: |

          sudo apt-get update

          sudo apt-get install -y python3-pyelftools



      - name: Cache OpenWrt SDK

        id: cache-sdk

        uses: actions/cache@v4

        env:

          cache-name: "cache-sdk-${{ matrix.build_env.tag }}-${{ matrix.build_env.target}}-${{ matrix.build_env.subtarget}}"

        with:

          path: openwrt-sdk-*/

          key: ${{ runner.os }}-sdk-${{ env.cache-name }}



      - name: Download and extract OpenWrt SDK

        if: steps.cache-sdk.outputs.cache-hit != 'true'

        run: |

          echo "pkgarch: ${{ matrix.build_env.pkgarch}}, target:${{ matrix.build_env.target}}, subtarget: ${{ matrix.build_env.subtarget}}"



          # Get the actual SDK filename from the directory listing

          SDK_FILE=$(curl -s "https://downloads.openwrt.org/releases/${{ matrix.build_env.tag }}/targets/${{ matrix.build_env.target}}/${{ matrix.build_env.subtarget}}/" | grep -o "openwrt-sdk-${{ matrix.build_env.tag }}-${{ matrix.build_env.target}}-${{ matrix.build_env.subtarget}}_gcc-[^\"]*_musl[^\"]*\.Linux-x86_64\.tar\.[xz|zst]*" | head -n1)

          

          if [ -z "$SDK_FILE" ]; then

            echo "SDK file not found for ${{ matrix.build_env.tag }} ${{ matrix.build_env.target}} ${{ matrix.build_env.subtarget}}"

            exit 1

          fi

          

          SDK_DOWNLOAD_URL="https://downloads.openwrt.org/releases/${{ matrix.build_env.tag }}/targets/${{ matrix.build_env.target}}/${{ matrix.build_env.subtarget}}/${SDK_FILE}"

          echo "Downloading SDK: $SDK_DOWNLOAD_URL"

          

          wget "$SDK_DOWNLOAD_URL"

          

          # Extract based on file extension

          if [[ "$SDK_FILE" == *.tar.zst ]]; then

            tar --zstd -xf "$SDK_FILE"

          elif [[ "$SDK_FILE" == *.tar.xz ]]; then

            tar -xf "$SDK_FILE"

          else

            echo "Unknown archive format: $SDK_FILE"

            exit 1

          fi

          

          rm "$SDK_FILE"



      - name: Setup SDK and feeds

        run: |

          # Find SDK directory

          SDK_DIR=$(find . -maxdepth 1 -name "openwrt-sdk-*" -type d | head -n1)

          

          if [ -z "$SDK_DIR" ]; then

            echo "SDK directory not found"

            exit 1

          fi

          

          # Get absolute paths

          WORKSPACE_DIR=$(pwd)

          

          cd "$SDK_DIR"

          

          # Update feeds to include LuCI

          ./scripts/feeds update -a

          ./scripts/feeds install -a

          

          # Copy current repository packages directly to package directory

          cp -r "$WORKSPACE_DIR/kmod-amneziawg" package/

          cp -r "$WORKSPACE_DIR/amneziawg-tools" package/

          cp -r "$WORKSPACE_DIR/luci-proto-amneziawg" package/

          

          # Configure packages to build

          echo "CONFIG_PACKAGE_kmod-amneziawg=m" > .config

          echo "CONFIG_PACKAGE_amneziawg-tools=y" >> .config

          echo "CONFIG_PACKAGE_luci-proto-amneziawg=y" >> .config

          echo "CONFIG_PACKAGE_luci-i18n-amneziawg-ru=y" >> .config

          

          make defconfig



      - name: Build AmneziaWG packages

        run: |

          # Find SDK directory

          SDK_DIR=$(find . -maxdepth 1 -name "openwrt-sdk-*" -type d | head -n1)

          cd "$SDK_DIR"



          echo "Building AmneziaWG packages..."



          # Build kmod-amneziawg (kernel module)

          echo "Building kmod-amneziawg..."

          make package/kmod-amneziawg/{download,prepare} V=s || true

          make package/kmod-amneziawg/compile V=s || true



          # Build luci-proto-amneziawg (web interface)

          echo "Building luci-proto-amneziawg..."

          make package/luci-proto-amneziawg/{download,prepare} V=s

          make package/luci-proto-amneziawg/compile V=s



          # Build amneziawg-tools (userspace tools)

          echo "Building amneziawg-tools..."

          make package/amneziawg-tools/{download,prepare} V=s

          make package/amneziawg-tools/compile V=s

          

          echo "Build completed. Checking for built packages..."

          find bin/ -name "*.?pk" | grep -E "(amneziawg|luci-proto-amneziawg|luci-i18n-amneziawg)" | head -10



      - name: Prepare artifacts

        run: |

          # Find SDK directory

          SDK_DIR=$(find . -maxdepth 1 -name "openwrt-sdk-*" -type d | head -n1)

          

          mkdir -p awgrelease

          postfix="v${{ matrix.build_env.tag }}_${{ matrix.build_env.pkgarch}}_${{ matrix.build_env.target}}_${{ matrix.build_env.subtarget}}"

          

          # Copy built packages

          find "$SDK_DIR/bin/packages" -name "amneziawg-tools*.?pk" -exec sh -c 'file="$1"; postfix="$2"; ext="${file##*.}"; cp "$file" "awgrelease/amneziawg-tools_${postfix}.${ext}"' _ {} "${postfix}" \; || echo "amneziawg-tools package not found"

          find "$SDK_DIR/bin/packages" -name "luci-proto-amneziawg*.?pk" -exec sh -c 'file="$1"; postfix="$2"; ext="${file##*.}"; cp "$file" "awgrelease/luci-proto-amneziawg_${postfix}.${ext}"' _ {} "${postfix}" \; || echo "luci-proto-amneziawg package not found"

          find "$SDK_DIR/bin/packages" -name "luci-i18n-amneziawg-ru*.?pk" -exec sh -c 'file="$1"; postfix="$2"; ext="${file##*.}"; cp "$file" "awgrelease/luci-i18n-amneziawg-ru_${postfix}.${ext}"' _ {} "${postfix}" \; || echo "luci-i18n-amneziawg-ru package not found"

          find "$SDK_DIR/bin/targets" -name "kmod-amneziawg*.?pk" -exec sh -c 'file="$1"; postfix="$2"; ext="${file##*.}"; cp "$file" "awgrelease/kmod-amneziawg_${postfix}.${ext}"' _ {} "${postfix}" \; || echo "kmod-amneziawg package not found"

          

          echo "Built packages:"

          ls -la awgrelease/



      - name: Release

        uses: softprops/action-gh-release@v1

        with:

          files: awgrelease/*.?pk

          tag_name: v${{ matrix.build_env.tag }}

Для создания полного рабочего процесса GitHub Actions на основе вашего шаблона, необходимо учесть критический нюанс: версия ядра (kernel magic/hash). В OpenWrt пакеты kmod-* жестко привязаны к хэшу ядра. Если хэш в SDK не совпадет с вашим (09da6f80...), пакет не установится.

Ниже представлен модифицированный YAML. Я добавил этап инъекции хэша ядра, чтобы сборка соответствовала вашему требованию.

GitHub Actions Workflow: build-amneziawg.yml
YAML
name: Create Release on Tag

on:
  push:
    tags:
      - "v*.*.*"
  workflow_call:
    inputs:
      tag_name:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: 'OpenWRT version (e.g., 25.12.2)'
        required: true
        type: string
      targets:
        description: 'Targets (comma-separated)'
        required: false
        type: string
      subtargets:
        description: 'Subtargets (comma-separated)'
        required: false
        type: string

jobs:
  generate-config:
    runs-on: ubuntu-latest
    outputs:
      job-config: ${{ steps.generate-config.outputs.job-config }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.16.0'

      - name: Get OpenWRT version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ inputs.version }}" >> $GITHUB_ENV
            echo "TARGETS=${{ inputs.targets }}" >> $GITHUB_ENV
            echo "SUBTARGETS=${{ inputs.subtargets }}" >> $GITHUB_ENV
          elif [ "${{ github.event_name }}" = "workflow_call" ]; then
            echo "VERSION=${{ inputs.tag_name }}" >> $GITHUB_ENV
          else
            echo "VERSION=${GITHUB_REF/refs\/tags\/v/}" >> $GITHUB_ENV
          fi

      - name: Generate Job Config
        id: generate-config
        # Предполагается, что index.js формирует JSON matrix на основе VERSION
        run: |
          # Если index.js нет, можно подставить статический JSON для теста:
          # echo 'job-config=[{"tag":"25.12.2","pkgarch":"x86_64","target":"x86","subtarget":"64"}]' >> $GITHUB_OUTPUT
          node index.js ${{ env.VERSION }} "${{ env.TARGETS }}" "${{ env.SUBTARGETS }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: "v${{ matrix.build_env.tag }} - ${{ matrix.build_env.pkgarch}} :: ${{ matrix.build_env.target}}/${{ matrix.build_env.subtarget}}"
    runs-on: ubuntu-latest
    needs: generate-config
    strategy:
      matrix:
        build_env: ${{ fromJson(needs.generate-config.outputs.job-config) }}
      fail-fast: false

    steps:
      - name: Checkout AWG source code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pyelftools build-essential libncurses5-dev gawk git gettext libssl-dev xsltproc wget unzip

      - name: Download and extract OpenWrt SDK
        run: |
          # Формируем URL. Учитываем, что 25.12.2 может быть в releases или snapshots
          BASE_URL="https://downloads.openwrt.org/releases/${{ matrix.build_env.tag }}/targets/${{ matrix.build_env.target}}/${{ matrix.build_env.subtarget}}"
          SDK_FILE=$(curl -s "$BASE_URL/" | grep -o "openwrt-sdk-[^\"]*Linux-x86_64\.tar\.[xz|zst]*" | head -n1)
          
          wget "$BASE_URL/$SDK_FILE"
          tar -xf "$SDK_FILE"
          echo "SDK_DIR=$(find . -maxdepth 1 -name "openwrt-sdk-*" -type d | head -n1)" >> $GITHUB_ENV

      - name: Fix Kernel Hash (Vermagic)
        run: |
          # Внедряем ваш специфический хэш ядра, чтобы kmod установился без --force-depends
          cd ${{ env.SDK_DIR }}
          echo "Current kernel hash adjustment..."
          sed -i 's/$(LINUX_VERSION)-$(LINUX_RELEASE)-$(LINUX_VERMAGIC)/6.12.74-1-09da6f8026836be755e675b8c6a70b8b/g' include/kernel.mk || true
          # Также можно форсировать через файл .vermagic если SDK поддерживает
          echo "09da6f8026836be755e675b8c6a70b8b" > .vermagic

      - name: Setup SDK and feeds
        run: |
          cd ${{ env.SDK_DIR }}
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          
          # Копируем пакеты из вашего репозитория в SDK
          cp -r ../kmod-amneziawg package/
          cp -r ../amneziawg-tools package/
          cp -r ../luci-proto-amneziawg package/
          
          # Настройка конфига
          echo "CONFIG_PACKAGE_kmod-amneziawg=m" > .config
          echo "CONFIG_PACKAGE_amneziawg-tools=y" >> .config
          echo "CONFIG_PACKAGE_luci-proto-amneziawg=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-amneziawg-ru=y" >> .config
          make defconfig

      - name: Build AmneziaWG
        run: |
          cd ${{ env.SDK_DIR }}
          # Собираем в правильном порядке
          make package/amneziawg-tools/compile V=s
          make package/kmod-amneziawg/compile V=s
          make package/luci-proto-amneziawg/compile V=s

      - name: Prepare artifacts
        run: |
          mkdir -p awgrelease
          postfix="v${{ matrix.build_env.tag }}_${{ matrix.build_env.target}}_${{ matrix.build_env.subtarget}}"
          
          # Собираем все .ipk (или .apk для новых версий)
          find ${{ env.SDK_DIR }}/bin/ -name "*amneziawg*.?pk" -exec cp {} awgrelease/ \;
          
          echo "Files to release:"
          ls -la awgrelease/

      - name: Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          files: awgrelease/*
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
Особенности для версии 25.12.2:
Формат пакетов: Начиная с новых версий OpenWrt переходит с .ipk (opkg) на .apk (apk-tools). Скрипт использует маску *.?pk, чтобы подхватить оба варианта.

Kernel Patching: Хэш 09da6f80... подставляется напрямую в include/kernel.mk. Это самый надежный способ обмануть проверку зависимостей при установке.

Зависимости: Убедитесь, что в вашем репозитории папки kmod-amneziawg, amneziawg-tools и luci-proto-amneziawg находятся в корне.

Node.js: Скрипт index.js должен возвращать валидный JSON-массив. Если вы собираете только под одну архитектуру, можно упростить generate-config.





Gemini – это ИИ. Он может ошибаться.

